{% extends "base.html" %}

{% block title %}{{ note_name }} — Second Brain Portal{% endblock %}

{% block breadcrumb %}
<a href="/" class="breadcrumb-link">{{ t.dashboard }}</a>
<span class="breadcrumb-separator">/</span>
<span class="breadcrumb-item active">{{ note_name }}</span>
{% endblock %}

{% block content %}
<div class="note-container glass-panel animate-fade-in">
    <div class="note-header">
        <h1 class="note-title">{{ note_name }}</h1>
        <div class="note-actions">
            <span class="note-path">📂 {{ t.note_path }}: {{ note_path }}</span>
        </div>
    </div>
    
    <div class="note-content">
        {{ html_content | safe }}
    </div>
</div>
{% endblock %}
