<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.title_login }}</title>
    <!-- Outfit & Inter Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=4">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #08090d;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .login-logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .login-title {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #f3f4f6;
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #9ca3af;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f3f4f6;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 24px;
            text-align: left;
        }
        .login-lang {
            position: absolute;
            top: 24px;
            right: 24px;
        }
    </style>
</head>
<body>
    <div class="mesh-glow"></div>
    
    <div class="login-lang">
        <div class="lang-switcher">
            <a href="/set-lang?lang=uk" class="lang-link {% if lang == 'uk' %}active{% endif %}">UA</a>
            <span class="lang-separator">|</span>
            <a href="/set-lang?lang=en" class="lang-link {% if lang == 'en' %}active{% endif %}">EN</a>
        </div>
    </div>

    <div class="login-card">
        <div class="login-logo">🧠</div>
        <h1 class="login-title">{{ t.login_header }}</h1>
        <p class="login-subtitle">{{ t.login_subtitle }}</p>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="post">
            <div class="form-group">
                <label class="form-label" for="password">{{ t.login_label }}</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="{{ t.login_placeholder }}" required autofocus>
            </div>
            <button type="submit" class="login-btn">{{ t.login_btn }}</button>
        </form>
    </div>
</body>
</html>
